 <body class="h-full w-full flex items-center justify-center" style="background: transparent;">
  <div id="datetime-display" class="text-center px-6 py-4">
   <p id="datetime-text" class="text-2xl md:text-3xl lg:text-4xl font-medium tracking-wide" style="font-family: &quot;DM Sans&quot;, sans-serif; color: rgb(255, 252, 220); font-size: 28px;">April 7, 2026 - 20:04 - Eastern Daylight Time</p>
  </div>
  <script>
    const defaultConfig = {
      text_color: '#1a1a1a',
      font_family: 'DM Sans',
      font_size: 28
    };

    let config = { ...defaultConfig };

    function getTimezoneName() {
      try {
        const options = { timeZoneName: 'long' };
        const formatter = new Intl.DateTimeFormat('en-US', options);
        const parts = formatter.formatToParts(new Date());
        const tzPart = parts.find(part => part.type === 'timeZoneName');
        return tzPart ? tzPart.value : Intl.DateTimeFormat().resolvedOptions().timeZone;
      } catch (e) {
        return Intl.DateTimeFormat().resolvedOptions().timeZone;
      }
    }

    function formatDateTime() {
      const now = new Date();
      
      const monthNames = [
        'January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'
      ];
      
      const month = monthNames[now.getMonth()];
      const day = now.getDate();
      const year = now.getFullYear();
      
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      
      const timezone = getTimezoneName();
      
      return `${month} ${day}, ${year} - ${hours}:${minutes} - ${timezone}`;
    }

    function updateDisplay() {
      const textEl = document.getElementById('datetime-text');
      textEl.textContent = formatDateTime();
    }

    function applyConfig() {
      const textEl = document.getElementById('datetime-text');
      const currentFont = config.font_family || defaultConfig.font_family;
      const currentColor = config.text_color || defaultConfig.text_color;
      const currentSize = config.font_size || defaultConfig.font_size;
      
      textEl.style.fontFamily = `'${currentFont}', sans-serif`;
      textEl.style.color = currentColor;
      textEl.style.fontSize = `${currentSize}px`;
    }

    async function onConfigChange(newConfig) {
      config = { ...defaultConfig, ...newConfig };
      applyConfig();
    }

    function mapToCapabilities(cfg) {
      return {
        recolorables: [
          {
            get: () => cfg.text_color || defaultConfig.text_color,
            set: (value) => {
              cfg.text_color = value;
              window.elementSdk.setConfig({ text_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => cfg.font_family || defaultConfig.font_family,
          set: (value) => {
            cfg.font_family = value;
            window.elementSdk.setConfig({ font_family: value });
          }
        },
        fontSizeable: {
          get: () => cfg.font_size || defaultConfig.font_size,
          set: (value) => {
            cfg.font_size = value;
            window.elementSdk.setConfig({ font_size: value });
          }
        }
      };
    }

    function mapToEditPanelValues(cfg) {
      return new Map();
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }

    updateDisplay();
    applyConfig();
    setInterval(updateDisplay, 1000);
  </script>
