  <div id="app" style="background: transparent; display: flex; align-items: center; justify-content: center; height: 100%; width: 100%;"><button class="speaker-btn" id="speakerBtn" aria-label="Play pronunciation of Harisundhar Ramalingam">
    <svg id="speakerIcon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#fffcdc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon> <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path> <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>

  <script>
    const defaultConfig = {
      icon_color: '#fffcdc',
      active_color: '#3b82f6'
    };

    let isPlaying = false;
    let audioCtx = null;

    function setIconColor(color) {
      const svg = document.getElementById('speakerIcon');
      svg.setAttribute('stroke', color);
    }

    // Build speech audio using Web Audio API + SpeechSynthesis
    function playPronunciation() {
      if (isPlaying) return;
      isPlaying = true;

      const config = window.elementSdk?.config || defaultConfig;
      setIconColor(config.active_color || defaultConfig.active_color);

      const utterance = new SpeechSynthesisUtterance('Hareesunndhar Raamalinghum');
      utterance.rate = 0.82;
      utterance.pitch = 1.0;
      utterance.lang = 'en-US';

      utterance.onend = resetState;
      utterance.onerror = resetState;

      // Timeout fallback in case events don't fire
      const fallback = setTimeout(resetState, 5000);

      function resetState() {
        clearTimeout(fallback);
        isPlaying = false;
        const c = window.elementSdk?.config || defaultConfig;
        setIconColor(c.icon_color || defaultConfig.icon_color);
      }

      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    document.getElementById('speakerBtn').addEventListener('click', playPronunciation);

    // Element SDK init
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        if (!isPlaying) {
          setIconColor(config.icon_color || defaultConfig.icon_color);
        }
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          {
            get: () => config.icon_color || defaultConfig.icon_color,
            set: (v) => { config.icon_color = v; window.elementSdk.setConfig({ icon_color: v }); }
          },
          {
            get: () => config.active_color || defaultConfig.active_color,
            set: (v) => { config.active_color = v; window.elementSdk.setConfig({ active_color: v }); }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      }),
      mapToEditPanelValues: () => new Map()
    });
  </script>
