  <script>
    const greetings = [
      "வணக்கம்",
      "Hello",
      "Hola",
      "Bonjour",
      "Hallo",
      "Ciao",
      "Olá",
      "こんにちは",
      "你好",
      "안녕하세요",
      "مرحباً",
      "नमस्ते",
      "Привет",
      "Hej",
      "Hei",
      "Hoi",
      "Cześć",
      "Szia",
      "Merhaba",
      "Xin chào",
      "Sawubona",
      "Halo",
      "สวัสดี",
      "שלום",
      "Γεια σας"
    ];

    const defaultConfig = {};
    let config = { ...defaultConfig };

    const container = document.getElementById('greeting-container');
    const greetingElements = [];

    // Create all greeting elements
    greetings.forEach((greeting, index) => {
      const element = document.createElement('div');
      element.className = 'greeting-text text-5xl md:text-7xl lg:text-8xl font-bold';
      element.textContent = greeting;
      element.id = `greeting-${index}`;
      container.appendChild(element);
      greetingElements.push(element);
    });

    let currentIndex = 0;

    function showNextGreeting() {
      // Remove active class from all
      greetingElements.forEach(el => {
        el.classList.remove('active');
      });

      // Add active class to current
      greetingElements[currentIndex].classList.add('active');

      // Move to next index
      currentIndex = (currentIndex + 1) % greetings.length;
    }

    // Start the animation
    showNextGreeting();
    setInterval(showNextGreeting, 3000);

    // Initialize Element SDK
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (newConfig) => {
        config = { ...newConfig };
      },
      mapToCapabilities: (config) => ({
        recolorables: [],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map()
    });
  </script>
